  <line x1="200" y1="142" x2="1000" y2="142" stroke="url(#glow2)" stroke-width=".8" opacity=".2" class="al2"/>
  <!-- Name -->
  <text x="600" y="118" text-anchor="middle" class="name">Zuhayr</text>
  <rect x="690" y="90" width="4" height="35" rx="1" fill="#00D9FF" class="cur"/>
  <text x="600" y="155" text-anchor="middle" class="sub">ENTREPRENEUR  ·  BUILDER  ·  FINANCE × CODE</text>
