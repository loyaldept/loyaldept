  <rect x="138" y="195" width="12" height="12" rx="2" fill="#BD00FF" class="tile d7"/>
  <!-- Right mosaic -->
  <rect x="1160" y="12" width="20" height="20" rx="4" fill="#BD00FF" class="tile d1"/>
  <rect x="1160" y="42" width="20" height="20" rx="4" fill="#00D9FF" class="tile d6"/>
