<svg viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D9FF"/>
      <stop offset="100%" stop-color="#BD00FF"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#BD00FF"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
  </defs>
  <style>
    .bg{fill:#0D1117}
    .tile{opacity:.05;animation:pulse 3.5s ease-in-out infinite}
    .d0{animation-delay:0s}.d1{animation-delay:.25s}.d2{animation-delay:.5s}.d3{animation-delay:.75s}
    .d4{animation-delay:1s}.d5{animation-delay:1.25s}.d6{animation-delay:1.5s}.d7{animation-delay:1.75s}
    .d8{animation-delay:2s}.d9{animation-delay:2.25s}.d10{animation-delay:2.5s}.d11{animation-delay:2.75s}
    .d12{animation-delay:3s}.d13{animation-delay:.35s}.d14{animation-delay:1.15s}.d15{animation-delay:1.85s}
    @keyframes pulse{0%,100%{opacity:.04}50%{opacity:.4}}
    .name{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;font-size:64px;font-weight:700;fill:#FFF}
    .sub{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;font-size:16px;fill:#8B949E;letter-spacing:4px}
    .al{stroke-dasharray:600;stroke-dashoffset:600;animation:draw 2.5s ease-out forwards}
    .al2{stroke-dasharray:600;stroke-dashoffset:600;animation:draw 2.5s ease-out .3s forwards}
    @keyframes draw{to{stroke-dashoffset:0}}
    .cur{animation:blink 1s step-end infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  </style>
  <rect width="1200" height="220" class="bg"/>
  <!-- Left mosaic -->
  <rect x="20" y="12" width="20" height="20" rx="4" fill="#00D9FF" class="tile d0"/>
  <rect x="20" y="42" width="20" height="20" rx="4" fill="#BD00FF" class="tile d5"/>
  <rect x="20" y="72" width="20" height="20" rx="4" fill="#00D9FF" class="tile d10"/>
